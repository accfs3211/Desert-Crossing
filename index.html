<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Desert Crossing Demo</title>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&display=swap");

			html,
			body {
				margin: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #1a1a2e;
			}

			body {
				position: relative;
			}

			canvas {
				display: block;
			}

			#start-screen {
				position: fixed;
				inset: 0;
				background: center / cover no-repeat url("./assets/Start Screen.png");
				z-index: 10;
			}

			#start-button {
				position: absolute;
				right: 0;
				bottom: 4vh;
				width: min(64vw, 510px);
				height: 138px;
				border: 0;
				clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%);
				background: linear-gradient(
					90deg,
					rgba(255, 200, 0, 0) 0%,
					rgba(255, 200, 0, 0.3) 24%,
					rgba(255, 200, 0, 0.7) 58%,
					rgba(255, 200, 0, 0.92) 100%
				);
				color: #ffffff;
				font: italic 800 clamp(3rem, 6vw, 4.8rem) / 1 "Cairo", sans-serif;
				text-transform: uppercase;
				letter-spacing: 0.03em;
				cursor: pointer;
				text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
				transition: filter 0.18s ease, transform 0.18s ease;
			}

			#start-button:hover {
				filter: brightness(1.1);
				transform: translateY(-2px);
			}

			#start-button:active {
				transform: translateY(0);
			}
		</style>
	</head>
	<body>
		<div id="start-screen">
			<button id="start-button" type="button" aria-label="Start game">START</button>
		</div>
		<script type="module">
			const startScreen = document.getElementById("start-screen");
			const startButton = document.getElementById("start-button");
			let gameStarted = false;

			async function startGame() {
				if (gameStarted) return;
				gameStarted = true;
				startScreen.style.display = "none";
				await import("/src/main.js");
			}

			startButton.addEventListener("click", startGame);
		</script>
	</body>
</html>
